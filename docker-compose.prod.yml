# Production compose — Railway deployment topology
#
# PostgreSQL is intentionally ABSENT: the database is Supabase Postgres
# (project jndnaisccgmoemcohvpd). Point DB_* at the Supabase SESSION POOLER
# host (IPv4) — the direct db.<ref>.supabase.co host is IPv6-only and is
# unreachable from most container platforms, including Railway.
#
# The frontend is NOT here either: it deploys separately on Vercel with
# NEXT_PUBLIC_API_URL set to the backend's public URL.
#
# On Railway this maps to three services:
#   redis   -> Railway's managed Redis (or this image)
#   backend -> backend/Dockerfile        (config: backend/railway.json)
#   worker  -> backend/Dockerfile.worker (config: backend/railway.worker.json)
#
# Local production-parity run:
#   docker compose -f docker-compose.prod.yml up --build

services:
  # Redis — Celery broker/result backend + cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI backend (HTTP + live-meeting WebSocket)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Database — Supabase Postgres via IPv4 session pooler
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-postgres}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      # Redis / Celery
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # JWT
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      # Speech-to-text / diarization
      GROQ_API_KEY: ${GROQ_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      HF_TOKEN: ${HF_TOKEN}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
      USE_MOCK_TRANSCRIPTION: ${USE_MOCK_TRANSCRIPTION:-false}
      DEVICE: cpu
      # Server
      PORT: 8000
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Celery worker (broker/result on Redis)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-postgres}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      GROQ_API_KEY: ${GROQ_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      HF_TOKEN: ${HF_TOKEN}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
      DEVICE: cpu
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
