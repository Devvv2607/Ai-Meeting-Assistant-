services:
  # NOTE: no PostgreSQL service — the database is Supabase Postgres.
  # Set DB_* in .env to the Supabase SESSION POOLER (IPv4) host; the direct
  # db.<ref>.supabase.co host is IPv6-only and unreachable from Docker.

  # Redis Cache & Broker
  redis:
    image: redis:7-alpine
    container_name: ai-meeting-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-meeting-backend
    environment:
      # Database — Supabase Postgres (values from .env; use the IPv4 pooler host)
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-postgres}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      # Redis - use redis service name in Docker
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # JWT
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      # Whisper
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      DEVICE: ${DEVICE:-cpu}
      # AWS S3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-ai-meeting-bucket}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      # LLM
      GROQ_API_KEY: ${GROQ_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      # Debug
      DEBUG: ${DEBUG:-False}
    volumes:
      - ./backend:/app
      - /tmp:/tmp
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: ai-meeting-celery
    environment:
      # Database — Supabase Postgres (values from .env; use the IPv4 pooler host)
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-postgres}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      # Redis - use redis service name in Docker
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # Whisper
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      DEVICE: ${DEVICE:-cpu}
      # AWS S3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-ai-meeting-bucket}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      # LLM
      GROQ_API_KEY: ${GROQ_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
    volumes:
      - ./backend:/app
      - /tmp:/tmp
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_config worker --loglevel=info --concurrency=2

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-meeting-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis_data:

networks:
  default:
    name: ai-meeting-network
